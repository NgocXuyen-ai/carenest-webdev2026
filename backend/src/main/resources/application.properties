spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT}

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

ai.service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}
ai.service.internal-token=${AI_INTERNAL_TOKEN:}
ai.service.connect-timeout-ms=${AI_SERVICE_CONNECT_TIMEOUT_MS:5000}
ai.service.read-timeout-ms=${AI_SERVICE_READ_TIMEOUT_MS:55000}
